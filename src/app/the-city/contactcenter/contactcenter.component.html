<div class="room">


  <img
    class="background"
    src="/assets/Contact Center.webp"
    alt=""
    draggable="false"
  >
  <div
    class="player"
    [style.left.px]="playerX"
    [style.top.px]="playerY"
  >
    <app-bayan [frame]="currentFrame"></app-bayan>
  </div>

  <div
  *ngIf="showInteractButton && activeTrigger && !showDialogue"
  class="interact-button"
  [style.left.px]="activeTrigger.x + activeTrigger.width / 2"
  [style.top.px]="activeTrigger.y - 60"
>
  E
</div>

<div
  *ngIf="showDialogue"
  class="dialogue-overlay"
>

  <div class="dialogue-box">

  <img
    class="dialogue-image"
    src="assets/window.webp"
    alt=""
  >
  <button
    class="hidden-close-btn"
    (click)="closeDialogue()"
  ></button>

  <div class="dialogue-title">
    {{ activeTrigger?.title }}
  </div>

  <div class="conversation-layout">


    <div class="speech-area">

      <div class="dialogue-text">

  <ng-container *ngIf="dialogueIndex === 0">

    <div class="contact-line">
      Email:
      <a href="mailto:Bayanmrkn2005@gmail.com">
        Bayanmrkn2005@gmail.com
      </a>
    </div>

    <div class="contact-line">
      Instagram:
      <a
        href="https://www.instagram.com/bayanmoneerm/?hl=en"
        target="_blank"
      >
        Bayanmoneerm
      </a>
    </div>

    <div class="contact-line">
      TikTok:
      <a
        href="https://www.tiktok.com/@notberrycool?lang=en"
        target="_blank"
      >
        Notberrycool
      </a>
    </div>

    <div class="contact-line">
      LinkedIn:
      <a
        href="https://www.linkedin.com/in/bayanmrakkan/"
        target="_blank"
      >
        Bayanmrakkan
      </a>
    </div>

    <div class="contact-line">
      Phone:
      <a href="tel:+966573007224">
        +966 57 300 7224
      </a>
    </div>

  </ng-container>

</div>

    </div>

  </div>

  <button
    *ngIf="dialogueIndex < (activeTrigger?.conversation?.length || 0) - 1"
    class="next-btn"
    (click)="nextDialogue()"
  >
    NEXT
  </button>

  <button
    *ngIf="dialogueIndex === (activeTrigger?.conversation?.length || 0) - 1"
    class="next-btn"
    (click)="closeDialogue()"
  >
    OK
  </button>


  </div>

</div>


<button
  class="back-city-btn"
  routerLink="/home"
>
  CITY
</button>

</div>
